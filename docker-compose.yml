version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://entropi:entropi@db:5432/entropi
      - API_ENV=development
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: entropi
      POSTGRES_PASSWORD: entropi
      POSTGRES_DB: entropi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entropi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
